<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>QUIXO</title>

  <style>
    .quixo-board-frame {
      width: min(92vw, 760px);
      margin: 36px auto;
      padding: 24px;
      border: 14px solid transparent;
      border-radius: 8px;
      background:
        linear-gradient(#2a170b, #2a170b) padding-box,
        repeating-linear-gradient(90deg,
          #3a210f 0 20px,
          #7a4a24 20px 44px,
          #c89152 44px 56px,
          #5a3318 56px 78px) border-box;
      box-shadow:
        inset 0 0 22px rgba(0, 0, 0, 0.65),
        0 24px 55px rgba(0, 0, 0, 0.5);
    }

    .quixo-canvas {
      display: block;
      max-width: 100%;
      height: auto !important;
      margin: 0 auto;
      border-radius: 6px;
      background:
        radial-gradient(circle at 30% 20%, rgba(255, 233, 181, 0.2), transparent 30%),
        repeating-linear-gradient(90deg,
          #9b6332 0 34px,
          #b9783d 34px 68px,
          #7a4a24 68px 102px);
      box-shadow:
        inset 0 0 0 8px rgba(58, 33, 15, 0.8),
        inset 0 0 34px rgba(0, 0, 0, 0.35);
    }

    /* animația shake */
    @keyframes shake {
      0% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-10px);
      }

      40% {
        transform: translateX(10px);
      }

      60% {
        transform: translateX(-10px);
      }

      80% {
        transform: translateX(10px);
      }

      100% {
        transform: translateX(0);
      }
    }

    .shake {
      animation: shake 0.6s ease;
    }

    body {
      font-family: 'Cinzel', serif;
    }
  </style>
</head>

<body class="bg-[#1c140d]">

  <section id="start-section"
    class="h-screen flex flex-col justify-center items-center text-center overflow-hidden relative">

    <h1 class="text-[9rem] mb-[30px] text-[#deddd6] drop-shadow-[0_0_20px_rgba(255,0,212,0.8)] shake">
      Quixo


    </h1>

    <button id="startBtn" onclick="controller.showFormBtnHanddle()"
      class="px-[40px] py-[15px] text-[1.5rem] bg-yellow-400 text-[#1e1e2f] font-bold rounded-lg transition duration-300 hover:scale-110 hover:bg-yellow-300">
      Start New Game!
    </button>

    <div id="gameModeSelection" style="display: none" class="mt-[20px] gap-4">
      <p class="mb-2 text-xl text-yellow-300">Alege Modul de Joc:</p>

      <button onclick="controller.selecteazaMod('hvh')"
        class="w-[280px] py-[12px] bg-emerald-500 text-white font-bold rounded-lg transition duration-300 hover:scale-105 hover:bg-emerald-400 shadow-md">
        ⚔️ Human vs Human
      </button>

      <button onclick="controller.selecteazaMod('easy')"
        class="w-[280px] py-[12px] bg-sky-500 text-white font-bold rounded-lg transition duration-300 hover:scale-105 hover:bg-sky-400 shadow-md">
        👶 VS Computer (Easy)
      </button>

      <button onclick="controller.selecteazaMod('moderate')"
        class="w-[280px] py-[12px] bg-purple-500 text-white font-bold rounded-lg transition duration-300 hover:scale-105 hover:bg-purple-400 shadow-md">
        🤖 VS Computer (Moderate)
      </button>
    </div>

    <div id="nameForm" style="display: none" class="mt-[20px]">
      <p id="nameFormTitle" class="mb-4 text-lg">
        Introdu numele jucătorilor:
      </p>

      <input type="text" id="playerX" placeholder="Jucătorul 1 (X)"
        class="block mx-auto p-[10px] text-[1.2rem] rounded-md text-black text-center mb-4" />

      <div id="playerOContainer">
        <input type="text" id="playerO" placeholder="Jucătorul 2 (O)"
          class="block mx-auto p-[10px] text-[1.2rem] rounded-md text-black text-center mb-4" />
      </div>

      <button onclick="controller.startGameBtnHanddle()" id="startGameRealBtn"
        class="px-[40px] py-[15px] text-[1.5rem] bg-yellow-400 text-[#1e1e2f] font-bold rounded-lg transition duration-300 hover:scale-110 hover:bg-yellow-300 mt-2">
        Start Game
      </button>
    </div>
  </section>

  <section id="game-div" class="w-[80%] m-auto max-w-[700px]"></section>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
  <script type="module" src="App.js"></script>
</body>

</html>
