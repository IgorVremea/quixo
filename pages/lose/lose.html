<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <title>You lost!</title>

    <style>
      /* Shake */
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-10px);
        }
        40% {
          transform: translateX(10px);
        }
        60% {
          transform: translateX(-10px);
        }
        80% {
          transform: translateX(10px);
        }
        100% {
          transform: translateX(0);
        }
      }

      /* Glow */
      @keyframes glow {
        0%,
        100% {
          text-shadow: 0 0 10px red;
        }
        50% {
          text-shadow: 0 0 30px yellow;
        }
      }

      .shake {
        animation: shake 0.6s ease;
      }

      .glow-hover:hover {
        animation:
          shake 0.5s ease,
          glow 1s infinite;
      }
    </style>
  </head>

  <body
    class="h-screen flex flex-col justify-center items-center text-center text-white bg-[radial-gradient(circle_at_bottom,#1e1e2f,#000000)] overflow-hidden font-[Arial]"
  >
    <h1
      class="text-[4rem] mb-[30px] text-[rgb(255,60,0)] font-bold drop-shadow-[0_0_20px_rgba(255,25,0,0.8)] inline-block shake glow-hover"
    >
      You lost!
    </h1>

    <button
      class="px-[40px] py-[15px] text-[1.2rem] bg-yellow-400 text-[#1e1e2f] font-bold rounded-lg transition duration-300 hover:scale-110 hover:bg-yellow-300"
    >
      Try again!
    </button>
  </body>
</html>
