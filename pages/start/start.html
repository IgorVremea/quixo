<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Quixo - Start</title>

    <style>
      /* animația shake */
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-10px);
        }
        40% {
          transform: translateX(10px);
        }
        60% {
          transform: translateX(-10px);
        }
        80% {
          transform: translateX(10px);
        }
        100% {
          transform: translateX(0);
        }
      }

      .shake {
        animation: shake 0.6s ease;
      }
    </style>
  </head>

  <!-- Oberflow-hidden ascunde scrollbar  -->

  <!--  height: 100vh;
     display: flex;
       flex-direction: column; 
  justify-content: center; 
   align-items: center; 
    text-align: center;
   color: white;
     font-weight: bold;
      background: radial-gradient(circle at bottom, #1e1e2f, #000000);
        overflow: hidden; // sa nu iasa inafara ecranului
  */ -->

  <body
    class="h-screen flex flex-col justify-center items-center text-center text-white font-bold bg-[radial-gradient(circle_at_bottom,#1e1e2f,#000000)] overflow-hidden"
  >
    <!-- font-size: 9rem;
      margin-bottom: 30px;
       color: #deddd6;
        filter:drop-shadow(0 0 20px rgba(255, 0, 212, 0.8)); -->

    <h1
      class="text-[9rem] mb-[30px] text-[#deddd6] drop-shadow-[0_0_20px_rgba(255,0,212,0.8)] shake"
    >
      Quixo
    </h1>

    <!-- showForm() butonul de sus dispare dupa ce este apasat , mb-4 spatiu sub imput -->

    <!-- padding-left: 40px; 
     padding-right: 40px; 
     padding-top: 15px;
    padding-bottom: 15px; 
    font-size: 1.5rem;
     background-color: #facc15;
      color:#1e1e2f;
       font-weight: bold; 
       border-radius: 0.5rem;
        transition: all 0.3s ease; 
        transform: scale(1.1);
         background-color: #fde047; -->

    <button
      id="startBtn"
      onclick="showForm()"
      class="px-[40px] py-[15px] text-[1.5rem] bg-yellow-400 text-[#1e1e2f] font-bold rounded-lg transition duration-300 hover:scale-110 hover:bg-yellow-300"
    >
      Start New Game!
    </button>

    <!-- FORMULAR NUME -->

    <!-- display: none;
      margin-top: 20px;
       margin-bottom: 1rem;
        font-size: 1.125rem; -->

    <div id="nameForm" class="hidden mt-[20px]">
      <p class="mb-4 text-lg">Introdu numele jucătorilor:</p>

      <!-- Element pe linie separata -->

      <!-- display: block;
  margin-left: auto;
  margin-right: auto;
  padding: 10px;
  font-size: 1.2rem;
  border-radius: 0.375rem; /* rounded-md */
  color: black;
  text-align: center;
  margin-bottom: 1rem; -->

      <input
        type="text"
        id="player1"
        placeholder="Jucătorul 1 (X)"
        class="block mx-auto p-[10px] text-[1.2rem] rounded-md text-black text-center mb-4"
      />

      <input
        type="text"
        id="player2"
        placeholder="Jucătorul 2 (O)"
        class="block mx-auto p-[10px] text-[1.2rem] rounded-md text-black text-center mb-4"
      />

      <!-- padding: 15px 40px;              
  font-size: 1.5rem;
  background-color: #facc15;       
  color: #1e1e2f;
  font-weight: bold;
  border-radius: 0.5rem;          
  transition: all 0.3s ease;
  transform: scale(1.1);
  background-color: #fde047;  -->

      <button
        onclick="startGame()"
        class="px-[40px] py-[15px] text-[1.5rem] bg-yellow-400 text-[#1e1e2f] font-bold rounded-lg transition duration-300 hover:scale-110 hover:bg-yellow-300"
      >
        Start Game
      </button>
    </div>

    <script src="start.js"></script>
  </body>
</html>
