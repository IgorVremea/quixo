<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <title>You win!</title>

    <style>
      /* shake animation */
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-10px);
        }
        40% {
          transform: translateX(10px);
        }
        60% {
          transform: translateX(-10px);
        }
        80% {
          transform: translateX(10px);
        }
        100% {
          transform: translateX(0);
        }
      }

      .shake {
        animation: shake 0.6s ease;
      }

      /* sparkles animation */
      @keyframes moveSparkles {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-200px);
        }
      }
    </style>
  </head>

  <!-- height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  font-weight: bold;
  background: radial-gradient(circle at bottom, #1e1e2f, #000000);
  overflow: hidden;  // sa nu iasa inafara ecranului 
  -->

  <body
    class="h-screen flex flex-col justify-center items-center text-center text-white font-bold bg-[radial-gradient(circle_at_bottom,#1e1e2f,#000000)] overflow-hidden"
  >
    <!-- SPARKLES BACKGROUND -->

    <!-- position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
  pointer-events: none;
  z-index: 0; -->

    <div class="fixed inset-0 pointer-events-none z-0">
      <!-- position: absolute;
  top: -100%;
  right: -100%;
  bottom: -100%;
  left: -100%;
  opacity: 0.8;
  background-image: radial-gradient(gold 4px, transparent 4px);     //sparkles first layer
  background-size: 60px 60px;
  animation: moveSparkles 10s linear infinite; 
  
  background-image: radial-gradient(white 2px, transparent 2px);    //sparkles second layer
  -->

      <div
        class="absolute inset-[-100%] opacity-80 bg-[radial-gradient(gold_4px,transparent_4px)] bg-[size:60px_60px] animate-[moveSparkles_10s_linear_infinite]"
      ></div>

      <div
        class="absolute inset-[-100%] opacity-50 bg-[radial-gradient(white_2px,transparent_2px)] bg-[size:80px_80px] animate-[moveSparkles_18s_linear_infinite]"
      ></div>
    </div>

    <!-- TEXT -->

    <!-- position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  font-size: 4rem;
  margin-bottom: 30px;
  color: #facc15; 
  filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.9)); -->

    <h1
      class="relative z-10 flex items-center gap-6 text-[4rem] mb-[30px] text-yellow-400 drop-shadow-[0_0_20px_rgba(255,0,0,0.9)] shake"
    >
      <!-- color: #60a5fa;  
  font-size: 2.25rem;

  color: #60a5fa; 
  font-size: inherit; // are dimensiunea parintelui sau (4 rem de la h1)- in acest caz
   -->

      <i class="bi bi-stars text-blue-400 text-4xl"></i>
      <i class="bi bi-trophy-fill text-blue-400"></i>

      You win!

      <i class="bi bi-trophy-fill text-blue-400"></i>
      <i class="bi bi-stars text-blue-400 text-4xl"></i>
    </h1>

    <!-- BUTTON -->

    <!-- position: relative;
  z-index: 10; // elementul trebuie sa fie deasupra celor care au un z mai mic
  padding: 15px 40px;
  font-size: 1.2rem;
  background-color: #facc15; /* yellow-400 */
  color: #1e1e2f;
  font-weight: bold;
  border-radius: 0.5rem;
  transition: all 0.3s ease;
  transform: scale(1.1);
  background-color: #fde047; -->

    <button
      class="relative z-10 px-[40px] py-[15px] text-[1.2rem] bg-yellow-400 text-[#1e1e2f] font-bold rounded-lg transition duration-300 hover:scale-110 hover:bg-yellow-300"
    >
      Play again
    </button>
  </body>
</html>
