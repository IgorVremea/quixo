<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <title>You win!</title>

    <style>
      /* shake animation */
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-10px);
        }
        40% {
          transform: translateX(10px);
        }
        60% {
          transform: translateX(-10px);
        }
        80% {
          transform: translateX(10px);
        }
        100% {
          transform: translateX(0);
        }
      }

      .shake {
        animation: shake 0.6s ease;
      }

      /* sparkles animation */
      @keyframes moveSparkles {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-200px);
        }
      }
    </style>
  </head>

  <body
    class="h-screen flex flex-col justify-center items-center text-center text-white font-bold bg-[radial-gradient(circle_at_bottom,#1e1e2f,#000000)] overflow-hidden"
  >
    <!-- SPARKLES BACKGROUND -->

    <div class="fixed inset-0 pointer-events-none z-0">
      <div
        class="absolute inset-[-100%] opacity-80 bg-[radial-gradient(gold_4px,transparent_4px)] bg-[size:60px_60px] animate-[moveSparkles_10s_linear_infinite]"
      ></div>

      <div
        class="absolute inset-[-100%] opacity-50 bg-[radial-gradient(white_2px,transparent_2px)] bg-[size:80px_80px] animate-[moveSparkles_18s_linear_infinite]"
      ></div>
    </div>

    <!-- TEXT -->

    <h1
      class="relative z-10 flex items-center gap-6 text-[4rem] mb-[30px] text-yellow-400 drop-shadow-[0_0_20px_rgba(255,0,0,0.9)] shake"
    >
      <i class="bi bi-stars text-blue-400 text-4xl"></i>
      <i class="bi bi-trophy-fill text-blue-400"></i>

      You win!

      <i class="bi bi-trophy-fill text-blue-400"></i>
      <i class="bi bi-stars text-blue-400 text-4xl"></i>
    </h1>

    <!-- BUTTON -->

    <button
      class="relative z-10 px-[40px] py-[15px] text-[1.2rem] bg-yellow-400 text-[#1e1e2f] font-bold rounded-lg transition duration-300 hover:scale-110 hover:bg-yellow-300"
    >
      Play again
    </button>
  </body>
</html>
